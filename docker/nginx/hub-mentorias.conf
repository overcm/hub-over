server {
    listen 80;
    server_name SEU_DOMINIO_AQUI;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Redireciona para HTTPS depois que o certificado (certbot) estiver emitido.
        # Comente a linha abaixo na primeira emissão do certificado.
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO_AQUI;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO_AQUI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO_AQUI/privkey.pem;

    # Uploads de vídeo/materiais grandes (vídeos de 2h+ podem passar de vários GB
    # e demorar bem mais que alguns minutos dependendo da conexão de upload do admin)
    client_max_body_size 10G;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 3600s;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
